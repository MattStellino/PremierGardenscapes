{% extends 'base.html' %}
{% load static %}

{% block content %}
<div id="gallery" style="background-color: rgb(99, 112, 104); width: 100%;">
  <div class="gallery-card">
    <h1 class="text-center mb-4">Gallery</h1>
    <hr class="section-divider mb-4">

    <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">
      <ol class="carousel-indicators">
        <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
        <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
      </ol>
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img class="d-block w-100 carousel-img fullscreen-img"
               src="{% static 'main/images/IMG_1708.jpeg' %}"
               alt="Before" onclick="showImageModal(this.src)">
        </div>
        <div class="carousel-item">
          <img class="d-block w-100 carousel-img fullscreen-img"
               src="{% static 'main/images/background.jpeg' %}"
               alt="After" onclick="showImageModal(this.src)">
        </div>
      </div>
      <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="sr-only">Previous</span>
      </a>
      <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="sr-only">Next</span>
      </a>
    </div>
  </div>
</div>
<script>
  function showImageModal(src) {
    document.getElementById('modalImage').src = src;
    $('#imageModal').modal('show');
  }
</script>


{% endblock %}
